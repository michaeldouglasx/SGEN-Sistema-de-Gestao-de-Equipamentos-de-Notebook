{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SGEN{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'accounts/css/style.css' %}?v=20260325-1">
</head>

<body>

    <header class="topo">
    <div class="container-nav">
        
        <div class="nav-esquerda">
            {% if user.is_authenticated %}
                {%if user.first_name%}
                <span>Olá, {{ user.first_name }}</span>
            {% endif %}
            {% endif %}
        </div>

        <div class="logo-area">
           <a href="{% url 'reserva' %}">
            <img src="{% static 'images/logoPronta.png' %}" alt="Logo SGEN">
           </a> 
        </div>

        <div >
            {% if user.is_authenticated %}
                <a class="sair" href="{% url 'logout' %}"> Sair </a>
            {% endif %}
        </div>

    </div>
</header>

    <main class="area-principal">
        <div class="container-conteudo">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>

</html>
