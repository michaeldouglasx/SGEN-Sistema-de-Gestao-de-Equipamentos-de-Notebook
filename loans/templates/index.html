{% extends 'base.html' %}

{% block title %}Reserva | SGEN{% endblock %}

{% block content %}
<section class="card card-reserva">
	<h2>Reserva de Equipamento</h2>
	<p class="descricao">Solicite um notebook informando os dados da reserva.</p>

	<form method="post" class="formulario-padrao" action="#">
		{% csrf_token %}

		<div class="campo">
			<label for="{{ form.carregador.id_for_label }}">Carregador?</label>
			<label class="carregador-opcao" for="{{ form.carregador.id_for_label }}">
				<input
					type="checkbox"
					name="{{ form.carregador.html_name }}"
					id="{{ form.carregador.id_for_label }}"
					{% if form.carregador.value %}checked{% endif %}
				>
				<span>Sim, preciso de carregador</span>
			</label>
		</div>
 
		<div class="campo">
			<label for="id_observacoes">Observações</label>
			<textarea id="id_observacoes" name="observacoes" rows="4" placeholder="Informe detalhes adicionais"></textarea>
		</div>

		<button type="submit" class="btn-principal">Confirmar Reserva</button>
	</form>
</section>
{% endblock %}
