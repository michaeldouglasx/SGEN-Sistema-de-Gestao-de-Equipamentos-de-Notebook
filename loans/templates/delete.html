{% extends 'base.html' %}

{% block title %} Deletar | SGEN{% endblock %}

{% block content %}
<section class="card card-reserva">
    <h2>Cancelar Reserva?</h2>

    <form method="post" class="formulario-padrao">
        {% csrf_token %}
        <button type="submit" class="btn-principal">Confirmar Cancelamento</button>
        <a href="{% url 'minhas_reservas' %}">Voltar</a>
    </form>

</section>
{% endblock %}
